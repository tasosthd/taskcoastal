<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#73cde7" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="CoastFlow" />
  <meta name="description" content="A premium coastal glassmorphism task manager built in one HTML file." />
  <title>CoastFlow — Premium Task Manager</title>

  <!--
    PWA NOTE:
    This app is single-file and PWA-ready. A real manifest usually lives at /manifest.webmanifest.
    To keep everything inside ONE file, JavaScript creates a Blob manifest dynamically at runtime.
  -->

  <style>
    /* =========================================================
       COASTFLOW — SINGLE FILE PREMIUM TASK MANAGER
       Mobile-first, iOS-inspired, coastal glassmorphism UI
       ========================================================= */

    /* -----------------------------
       1. CSS RESET + THEME TOKENS
    ----------------------------- */
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    :root {
      color-scheme: light;
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);

      --font: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", Inter, system-ui, sans-serif;

      --bg-1: #dff8ff;
      --bg-2: #a5e8f3;
      --bg-3: #f7fdff;
      --bg-4: #c8f4e5;

      --text: #07303d;
      --text-strong: #031e28;
      --muted: rgba(7, 48, 61, 0.66);
      --muted-2: rgba(7, 48, 61, 0.45);

      --glass: rgba(255, 255, 255, 0.42);
      --glass-strong: rgba(255, 255, 255, 0.68);
      --glass-soft: rgba(255, 255, 255, 0.24);
      --border: rgba(255, 255, 255, 0.58);
      --border-strong: rgba(255, 255, 255, 0.84);

      --accent: #0aa6c2;
      --accent-2: #58dcc8;
      --accent-3: #f8c978;
      --danger: #ff5f74;
      --success: #16c995;
      --warning: #ffb84d;

      --shadow: 0 24px 70px rgba(20, 125, 150, 0.20);
      --shadow-soft: 0 14px 40px rgba(20, 125, 150, 0.14);
      --inner: inset 0 1px 0 rgba(255, 255, 255, 0.72);

      --radius-xl: 34px;
      --radius-lg: 26px;
      --radius-md: 20px;
      --radius-sm: 16px;

      --blur: blur(28px) saturate(1.35);
      --speed: 260ms;
      --spring: cubic-bezier(.2, .9, .2, 1.15);
    }

    body.dark {
      color-scheme: dark;
      --bg-1: #021017;
      --bg-2: #063348;
      --bg-3: #081b27;
      --bg-4: #062f35;

      --text: #e9fbff;
      --text-strong: #ffffff;
      --muted: rgba(233, 251, 255, 0.66);
      --muted-2: rgba(233, 251, 255, 0.42);

      --glass: rgba(9, 35, 48, 0.48);
      --glass-strong: rgba(12, 48, 66, 0.72);
      --glass-soft: rgba(255, 255, 255, 0.08);
      --border: rgba(255, 255, 255, 0.14);
      --border-strong: rgba(255, 255, 255, 0.22);

      --accent: #65e8ff;
      --accent-2: #4ff0c5;
      --accent-3: #ffd18b;
      --shadow: 0 26px 80px rgba(0, 0, 0, 0.38);
      --shadow-soft: 0 16px 42px rgba(0, 0, 0, 0.26);
      --inner: inset 0 1px 0 rgba(255, 255, 255, 0.12);
    }

    html {
      min-height: 100%;
      scroll-behavior: smooth;
    }

    body {
      min-height: 100svh;
      font-family: var(--font);
      color: var(--text);
      overflow-x: hidden;
      background:
        radial-gradient(circle at 15% 12%, rgba(255, 255, 255, 0.9), transparent 28%),
        radial-gradient(circle at 82% 18%, rgba(88, 220, 200, 0.55), transparent 26%),
        radial-gradient(circle at 50% 90%, rgba(10, 166, 194, 0.42), transparent 34%),
        linear-gradient(135deg, var(--bg-1), var(--bg-2) 42%, var(--bg-3) 72%, var(--bg-4));
      transition: background 500ms ease, color 300ms ease;
      -webkit-font-smoothing: antialiased;
      text-rendering: geometricPrecision;
    }

    button,
    input,
    textarea,
    select {
      font: inherit;
      color: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
    }

    input,
    textarea {
      border: 0;
      outline: 0;
    }

    /* -----------------------------
       2. ANIMATED OCEAN BACKGROUND
    ----------------------------- */
    .ocean-scene {
      position: fixed;
      inset: 0;
      z-index: -5;
      overflow: hidden;
      pointer-events: none;
    }

    .ocean-scene::before,
    .ocean-scene::after {
      content: "";
      position: absolute;
      width: 130vw;
      height: 130vw;
      left: 50%;
      bottom: -92vw;
      border-radius: 43% 57% 50% 50%;
      transform: translateX(-50%);
      background: rgba(255, 255, 255, 0.28);
      animation: waveSpin 18s linear infinite;
      filter: blur(1px);
    }

    .ocean-scene::after {
      width: 150vw;
      height: 150vw;
      bottom: -108vw;
      background: rgba(10, 166, 194, 0.16);
      animation-duration: 26s;
      animation-direction: reverse;
    }

    .orb {
      position: absolute;
      border-radius: 999px;
      filter: blur(18px);
      opacity: .75;
      animation: floatOrb 9s ease-in-out infinite alternate;
    }

    .orb.one {
      width: 180px;
      height: 180px;
      top: 6%;
      left: -44px;
      background: rgba(255, 255, 255, 0.58);
    }

    .orb.two {
      width: 240px;
      height: 240px;
      top: 14%;
      right: -96px;
      background: rgba(88, 220, 200, 0.42);
      animation-delay: -2s;
    }

    .orb.three {
      width: 210px;
      height: 210px;
      bottom: 12%;
      left: 18%;
      background: rgba(248, 201, 120, 0.24);
      animation-delay: -5s;
    }

    @keyframes waveSpin {
      from { transform: translateX(-50%) rotate(0deg); }
      to { transform: translateX(-50%) rotate(360deg); }
    }

    @keyframes floatOrb {
      from { transform: translate3d(0, 0, 0) scale(1); }
      to { transform: translate3d(18px, -26px, 0) scale(1.08); }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px) scale(.985); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    @keyframes cardPulse {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-3px); }
    }

    @keyframes shimmer {
      from { transform: translateX(-120%); }
      to { transform: translateX(120%); }
    }

    @keyframes modalIn {
      from { opacity: 0; transform: translateY(24px) scale(.94); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    @keyframes toastIn {
      from { opacity: 0; transform: translate(-50%, 18px) scale(.96); }
      to { opacity: 1; transform: translate(-50%, 0) scale(1); }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation-duration: 0.001ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.001ms !important;
        scroll-behavior: auto !important;
      }
    }

    /* -----------------------------
       3. APP SHELL
    ----------------------------- */
    .app {
      width: min(100%, 540px);
      min-height: 100svh;
      margin: 0 auto;
      padding: calc(18px + var(--safe-top)) 16px calc(112px + var(--safe-bottom));
      position: relative;
    }

    .glass {
      background: var(--glass);
      border: 1px solid var(--border);
      box-shadow: var(--shadow-soft), var(--inner);
      backdrop-filter: var(--blur);
      -webkit-backdrop-filter: var(--blur);
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      margin-bottom: 18px;
      animation: fadeUp 580ms var(--spring) both;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .logo {
      width: 48px;
      height: 48px;
      border-radius: 18px;
      display: grid;
      place-items: center;
      background:
        linear-gradient(145deg, rgba(255,255,255,.86), rgba(255,255,255,.25)),
        radial-gradient(circle at 30% 20%, var(--accent-2), transparent 45%),
        linear-gradient(135deg, var(--accent), #78e2ff);
      box-shadow: 0 16px 34px rgba(10,166,194,.25), var(--inner);
      color: white;
      position: relative;
      overflow: hidden;
      flex: 0 0 auto;
    }

    .logo::before {
      content: "";
      width: 44px;
      height: 13px;
      border-radius: 999px;
      border: 2px solid rgba(255,255,255,.8);
      border-left-color: transparent;
      border-right-color: transparent;
      transform: rotate(-10deg);
    }

    .brand-copy {
      min-width: 0;
    }

    .eyebrow {
      font-size: 12px;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--muted);
      font-weight: 800;
    }

    .brand h1 {
      font-size: clamp(25px, 8vw, 38px);
      line-height: .98;
      letter-spacing: -0.055em;
      color: var(--text-strong);
      white-space: nowrap;
    }

    .icon-actions {
      display: flex;
      align-items: center;
      gap: 9px;
      flex: 0 0 auto;
    }

    .icon-btn {
      width: 45px;
      height: 45px;
      border-radius: 17px;
      display: grid;
      place-items: center;
      background: var(--glass-strong);
      border: 1px solid var(--border);
      box-shadow: var(--shadow-soft), var(--inner);
      backdrop-filter: var(--blur);
      -webkit-backdrop-filter: var(--blur);
      transition: transform var(--speed) var(--spring), background var(--speed) ease, box-shadow var(--speed) ease;
    }

    .icon-btn:active,
    .primary-btn:active,
    .filter-btn:active,
    .nav-item:active,
    .task-card:active {
      transform: scale(.94);
    }

    .icon {
      width: 20px;
      height: 20px;
      display: block;
    }

    /* -----------------------------
       4. HERO / GREETING CARD
    ----------------------------- */
    .hero-card {
      border-radius: var(--radius-xl);
      padding: 20px;
      overflow: hidden;
      position: relative;
      margin-bottom: 14px;
      animation: fadeUp 680ms var(--spring) 80ms both;
    }

    .hero-card::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 18% 20%, rgba(255,255,255,.72), transparent 24%),
        radial-gradient(circle at 86% 26%, rgba(88,220,200,.36), transparent 28%),
        linear-gradient(135deg, rgba(255,255,255,.25), transparent);
      pointer-events: none;
    }

    .hero-card::after {
      content: "";
      position: absolute;
      inset: 0;
      width: 45%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,.26), transparent);
      animation: shimmer 5s ease-in-out infinite;
      pointer-events: none;
    }

    .hero-content {
      position: relative;
      z-index: 1;
    }

    .greeting-row {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
    }

    .greeting h2 {
      font-size: clamp(30px, 10vw, 48px);
      line-height: .92;
      letter-spacing: -0.065em;
      color: var(--text-strong);
      margin-top: 7px;
      max-width: 320px;
    }

    .greeting p {
      margin-top: 12px;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.45;
      max-width: 330px;
      font-weight: 560;
    }

    .score-ring {
      width: 76px;
      height: 76px;
      border-radius: 24px;
      display: grid;
      place-items: center;
      background: var(--glass-strong);
      border: 1px solid var(--border-strong);
      box-shadow: var(--inner), 0 18px 36px rgba(10, 166, 194, .16);
      flex: 0 0 auto;
      position: relative;
      overflow: hidden;
    }

    .score-ring svg {
      position: absolute;
      inset: 9px;
      transform: rotate(-90deg);
    }

    .score-ring circle {
      fill: none;
      stroke-width: 6;
      stroke-linecap: round;
    }

    .score-bg {
      stroke: rgba(127, 180, 195, .25);
    }

    .score-progress {
      stroke: url(#scoreGradient);
      stroke-dasharray: 157;
      stroke-dashoffset: 157;
      transition: stroke-dashoffset 700ms cubic-bezier(.2,.8,.2,1);
    }

    .score-label {
      display: grid;
      place-items: center;
      line-height: 1;
      z-index: 1;
      color: var(--text-strong);
      font-weight: 900;
      letter-spacing: -0.05em;
    }

    .score-label small {
      display: block;
      font-size: 10px;
      letter-spacing: .07em;
      color: var(--muted);
      margin-top: 4px;
      font-weight: 800;
    }

    .quick-add {
      margin-top: 18px;
      display: flex;
      align-items: center;
      gap: 10px;
      background: rgba(255,255,255,.34);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 8px 8px 8px 15px;
      box-shadow: var(--inner);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
    }

    body.dark .quick-add {
      background: rgba(255,255,255,.06);
    }

    .quick-add input {
      flex: 1;
      min-width: 0;
      background: transparent;
      padding: 10px 0;
      color: var(--text-strong);
      font-size: 15px;
      font-weight: 650;
    }

    .quick-add input::placeholder {
      color: var(--muted-2);
    }

    .primary-btn {
      min-width: 48px;
      height: 48px;
      padding: 0 17px;
      border-radius: 18px;
      display: inline-grid;
      place-items: center;
      color: white;
      font-weight: 850;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      box-shadow: 0 16px 30px rgba(10, 166, 194, .25), var(--inner);
      transition: transform var(--speed) var(--spring), filter var(--speed) ease;
    }

    .primary-btn:hover {
      filter: brightness(1.04);
    }

    /* -----------------------------
       5. STATS WIDGETS
    ----------------------------- */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin: 14px 0;
      animation: fadeUp 720ms var(--spring) 140ms both;
    }

    .stat-card {
      min-height: 96px;
      border-radius: 24px;
      padding: 13px 12px;
      position: relative;
      overflow: hidden;
      transition: transform var(--speed) var(--spring), background var(--speed) ease;
    }

    .stat-card:nth-child(2) {
      animation: cardPulse 5.4s ease-in-out infinite;
    }

    .stat-card::before {
      content: "";
      position: absolute;
      width: 72px;
      height: 72px;
      border-radius: 999px;
      right: -28px;
      top: -30px;
      background: rgba(255, 255, 255, .34);
      filter: blur(1px);
    }

    .stat-title {
      position: relative;
      color: var(--muted);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: .09em;
      font-weight: 900;
    }

    .stat-value {
      position: relative;
      margin-top: 12px;
      font-size: 27px;
      letter-spacing: -0.06em;
      line-height: 1;
      color: var(--text-strong);
      font-weight: 950;
    }

    .stat-caption {
      position: relative;
      margin-top: 7px;
      color: var(--muted-2);
      font-size: 12px;
      font-weight: 700;
    }

    /* -----------------------------
       6. FILTERS + TASK LIST
    ----------------------------- */
    .section-head {
      display: flex;
      justify-content: space-between;
      align-items: end;
      gap: 12px;
      margin: 18px 2px 12px;
      animation: fadeUp 760ms var(--spring) 180ms both;
    }

    .section-head h3 {
      font-size: 21px;
      letter-spacing: -0.045em;
      color: var(--text-strong);
    }

    .section-head p {
      font-size: 13px;
      color: var(--muted);
      margin-top: 3px;
      font-weight: 650;
    }

    .filters {
      display: flex;
      gap: 7px;
      padding: 5px;
      border-radius: 18px;
      background: var(--glass-soft);
      border: 1px solid var(--border);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
    }

    .filter-btn {
      border-radius: 13px;
      padding: 9px 11px;
      background: transparent;
      color: var(--muted);
      font-size: 13px;
      font-weight: 850;
      transition: transform var(--speed) var(--spring), background var(--speed) ease, color var(--speed) ease;
    }

    .filter-btn.active {
      background: var(--glass-strong);
      color: var(--text-strong);
      box-shadow: var(--inner), 0 10px 22px rgba(10, 166, 194, .12);
    }

    .task-list {
      display: flex;
      flex-direction: column;
      gap: 11px;
      min-height: 260px;
      animation: fadeUp 820ms var(--spring) 220ms both;
    }

    .task-shell {
      position: relative;
      border-radius: 25px;
      touch-action: pan-y;
      user-select: none;
    }

    .delete-bg {
      position: absolute;
      inset: 0;
      border-radius: 25px;
      background: linear-gradient(135deg, var(--danger), #ff8a7b);
      display: flex;
      align-items: center;
      justify-content: flex-end;
      padding: 0 23px;
      color: white;
      font-weight: 950;
      letter-spacing: -0.03em;
      opacity: 0;
      transition: opacity 180ms ease;
    }

    .task-shell.swiping .delete-bg {
      opacity: 1;
    }

    .task-card {
      position: relative;
      border-radius: 25px;
      padding: 14px;
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 12px;
      align-items: center;
      transition:
        transform 220ms cubic-bezier(.2,.8,.2,1),
        opacity 220ms ease,
        background 220ms ease,
        box-shadow 220ms ease;
      will-change: transform;
    }

    .task-shell.dragging {
      opacity: .55;
    }

    .task-shell.drop-target .task-card {
      transform: scale(1.015);
      outline: 2px solid rgba(10,166,194,.35);
    }

    .check-btn {
      width: 34px;
      height: 34px;
      border-radius: 14px;
      display: grid;
      place-items: center;
      background: rgba(255,255,255,.35);
      border: 1px solid var(--border);
      box-shadow: var(--inner);
      flex: 0 0 auto;
      transition: transform var(--speed) var(--spring), background var(--speed) ease;
    }

    body.dark .check-btn {
      background: rgba(255,255,255,.07);
    }

    .task-shell.done .check-btn {
      background: linear-gradient(135deg, var(--success), var(--accent-2));
      color: white;
    }

    .check-mark {
      width: 16px;
      height: 16px;
      opacity: 0;
      transform: scale(.4);
      transition: opacity 180ms ease, transform 180ms var(--spring);
    }

    .task-shell.done .check-mark {
      opacity: 1;
      transform: scale(1);
    }

    .task-main {
      min-width: 0;
    }

    .task-title {
      font-size: 15.5px;
      line-height: 1.25;
      font-weight: 850;
      color: var(--text-strong);
      letter-spacing: -0.025em;
      overflow-wrap: anywhere;
      transition: color var(--speed) ease, text-decoration-color var(--speed) ease;
    }

    .task-shell.done .task-title {
      color: var(--muted-2);
      text-decoration: line-through;
      text-decoration-thickness: 2px;
      text-decoration-color: rgba(10,166,194,.5);
    }

    .task-meta {
      display: flex;
      align-items: center;
      gap: 7px;
      margin-top: 7px;
      color: var(--muted-2);
      font-size: 12px;
      font-weight: 720;
    }

    .priority-pill {
      height: 21px;
      padding: 0 8px;
      border-radius: 999px;
      display: inline-flex;
      align-items: center;
      background: rgba(255,255,255,.38);
      border: 1px solid var(--border);
      font-size: 11px;
      color: var(--text);
      font-weight: 850;
    }

    body.dark .priority-pill {
      background: rgba(255,255,255,.07);
    }

    .task-actions {
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .mini-btn {
      width: 34px;
      height: 34px;
      display: grid;
      place-items: center;
      border-radius: 14px;
      background: rgba(255,255,255,.28);
      border: 1px solid var(--border);
      color: var(--muted);
      transition: transform var(--speed) var(--spring), background var(--speed) ease, color var(--speed) ease;
    }

    body.dark .mini-btn {
      background: rgba(255,255,255,.06);
    }

    .mini-btn:active {
      transform: scale(.9);
    }

    .mini-btn.danger {
      color: var(--danger);
    }

    .empty-state {
      min-height: 260px;
      display: grid;
      place-items: center;
      text-align: center;
      padding: 28px 20px;
      border-radius: var(--radius-xl);
      border: 1px dashed var(--border-strong);
      background: var(--glass-soft);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
    }

    .empty-icon {
      width: 82px;
      height: 82px;
      border-radius: 30px;
      margin: 0 auto 16px;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at 34% 22%, rgba(255,255,255,.8), transparent 38%),
        linear-gradient(135deg, rgba(10,166,194,.28), rgba(88,220,200,.26));
      box-shadow: var(--inner), var(--shadow-soft);
      font-size: 33px;
    }

    .empty-state h4 {
      font-size: 20px;
      color: var(--text-strong);
      letter-spacing: -0.045em;
      margin-bottom: 7px;
    }

    .empty-state p {
      color: var(--muted);
      line-height: 1.45;
      font-size: 14px;
      font-weight: 650;
      max-width: 260px;
      margin: 0 auto;
    }

    /* -----------------------------
       7. FLOATING BOTTOM NAV
    ----------------------------- */
    .bottom-nav-wrap {
      position: fixed;
      left: 0;
      right: 0;
      bottom: calc(13px + var(--safe-bottom));
      z-index: 20;
      pointer-events: none;
      display: flex;
      justify-content: center;
      padding: 0 16px;
    }

    .bottom-nav {
      pointer-events: auto;
      width: min(100%, 500px);
      height: 74px;
      border-radius: 28px;
      display: grid;
      grid-template-columns: 1fr 1.12fr 1fr;
      align-items: center;
      padding: 8px;
      animation: fadeUp 720ms var(--spring) 300ms both;
    }

    .nav-item {
      height: 58px;
      border-radius: 22px;
      display: grid;
      place-items: center;
      gap: 2px;
      background: transparent;
      color: var(--muted);
      transition: transform var(--speed) var(--spring), background var(--speed) ease, color var(--speed) ease;
      font-weight: 850;
      font-size: 11px;
    }

    .nav-item.active {
      background: var(--glass-strong);
      color: var(--text-strong);
      box-shadow: var(--inner), 0 14px 28px rgba(10,166,194,.13);
    }

    .nav-add {
      height: 58px;
      border-radius: 22px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      color: white;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      box-shadow: 0 18px 34px rgba(10, 166, 194, .26), var(--inner);
      font-weight: 950;
      letter-spacing: -0.025em;
      transition: transform var(--speed) var(--spring), filter var(--speed) ease;
    }

    .nav-add:active {
      transform: scale(.95) translateY(1px);
    }

    /* -----------------------------
       8. MODAL EDITOR + TOAST
    ----------------------------- */
    .modal-backdrop {
      position: fixed;
      inset: 0;
      z-index: 50;
      display: none;
      align-items: flex-end;
      justify-content: center;
      padding: 16px 16px calc(16px + var(--safe-bottom));
      background: rgba(3, 24, 31, .36);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
    }

    .modal-backdrop.show {
      display: flex;
    }

    .modal-card {
      width: min(100%, 520px);
      border-radius: 34px;
      padding: 18px;
      animation: modalIn 320ms var(--spring) both;
    }

    .modal-handle {
      width: 44px;
      height: 5px;
      border-radius: 999px;
      background: var(--muted-2);
      margin: 0 auto 16px;
      opacity: .55;
    }

    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 15px;
    }

    .modal-header h3 {
      font-size: 24px;
      letter-spacing: -0.055em;
      color: var(--text-strong);
    }

    .field-group {
      display: grid;
      gap: 10px;
    }

    .field-label {
      font-size: 12px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .1em;
      font-weight: 950;
      margin-left: 4px;
    }

    .task-textarea,
    .priority-select {
      width: 100%;
      border-radius: 24px;
      background: rgba(255,255,255,.34);
      border: 1px solid var(--border);
      box-shadow: var(--inner);
      padding: 15px 16px;
      color: var(--text-strong);
      font-weight: 750;
    }

    body.dark .task-textarea,
    body.dark .priority-select {
      background: rgba(255,255,255,.06);
    }

    .task-textarea {
      min-height: 118px;
      resize: none;
      line-height: 1.4;
    }

    .priority-select {
      appearance: none;
      margin-top: 10px;
      background-image: linear-gradient(45deg, transparent 50%, var(--muted) 50%), linear-gradient(135deg, var(--muted) 50%, transparent 50%);
      background-position: calc(100% - 23px) 50%, calc(100% - 16px) 50%;
      background-size: 7px 7px, 7px 7px;
      background-repeat: no-repeat;
    }

    .modal-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 16px;
    }

    .secondary-btn {
      height: 52px;
      border-radius: 20px;
      background: rgba(255,255,255,.28);
      border: 1px solid var(--border);
      color: var(--text-strong);
      font-weight: 900;
      box-shadow: var(--inner);
      transition: transform var(--speed) var(--spring), background var(--speed) ease;
    }

    body.dark .secondary-btn {
      background: rgba(255,255,255,.06);
    }

    .secondary-btn:active {
      transform: scale(.96);
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: calc(102px + var(--safe-bottom));
      z-index: 80;
      display: none;
      max-width: calc(100% - 32px);
      padding: 13px 16px;
      border-radius: 18px;
      background: var(--glass-strong);
      border: 1px solid var(--border-strong);
      box-shadow: var(--shadow-soft), var(--inner);
      backdrop-filter: var(--blur);
      -webkit-backdrop-filter: var(--blur);
      color: var(--text-strong);
      font-size: 14px;
      font-weight: 850;
      text-align: center;
    }

    .toast.show {
      display: block;
      animation: toastIn 240ms var(--spring) both;
    }

    /* -----------------------------
       9. LOADER
    ----------------------------- */
    .loader {
      position: fixed;
      inset: 0;
      z-index: 100;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at 30% 25%, rgba(255,255,255,.7), transparent 30%),
        linear-gradient(135deg, var(--bg-1), var(--bg-2));
      transition: opacity 420ms ease, visibility 420ms ease;
    }

    .loader.hide {
      opacity: 0;
      visibility: hidden;
    }

    .loader-card {
      width: 148px;
      height: 148px;
      border-radius: 42px;
      display: grid;
      place-items: center;
      text-align: center;
      color: var(--text-strong);
      font-weight: 950;
      letter-spacing: -0.045em;
      animation: cardPulse 1.8s ease-in-out infinite;
    }

    .loader-wave {
      width: 54px;
      height: 22px;
      border-radius: 999px;
      border: 3px solid var(--accent);
      border-left-color: transparent;
      border-right-color: transparent;
      margin: 0 auto 12px;
      animation: waveSpin 1.6s linear infinite;
    }

    /* -----------------------------
       10. DESKTOP SAFETY POLISH
    ----------------------------- */
    @media (min-width: 700px) {
      .app {
        padding-top: calc(30px + var(--safe-top));
      }

      .hero-card,
      .modal-card {
        border-radius: 40px;
      }

      .bottom-nav {
        max-width: 470px;
      }
    }
  </style>
</head>
<body>
  <!-- Animated premium background -->
  <div class="ocean-scene" aria-hidden="true">
    <span class="orb one"></span>
    <span class="orb two"></span>
    <span class="orb three"></span>
  </div>

  <!-- Entry loader -->
  <div class="loader" id="loader" aria-hidden="true">
    <div class="loader-card glass">
      <div>
        <div class="loader-wave"></div>
        CoastFlow
      </div>
    </div>
  </div>

  <main class="app" id="app">
    <!-- Top app bar -->
    <header class="topbar">
      <div class="brand" aria-label="CoastFlow app identity">
        <div class="logo" aria-hidden="true"></div>
        <div class="brand-copy">
          <div class="eyebrow">Premium Focus</div>
          <h1>CoastFlow</h1>
        </div>
      </div>

      <div class="icon-actions">
        <button class="icon-btn" id="soundToggle" type="button" aria-label="Toggle sound effects">
          <svg class="icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path d="M4 9.5v5h3.5L13 19V5L7.5 9.5H4Z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
            <path id="soundWaveIcon" d="M16 9c1 .9 1.5 1.9 1.5 3S17 14.1 16 15" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </button>
        <button class="icon-btn" id="themeToggle" type="button" aria-label="Toggle dark mode">
          <svg class="icon" id="themeIcon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path d="M21 12.7A8.5 8.5 0 1 1 11.3 3 6.7 6.7 0 0 0 21 12.7Z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
          </svg>
        </button>
      </div>
    </header>

    <!-- Hero + quick add -->
    <section class="hero-card glass" aria-labelledby="greetingTitle">
      <div class="hero-content">
        <div class="greeting-row">
          <div class="greeting">
            <div class="eyebrow" id="todayLabel">Today</div>
            <h2 id="greetingTitle">Good morning.</h2>
            <p id="focusLine">Build a calm list. Win the day with clean execution.</p>
          </div>

          <div class="score-ring" aria-label="Productivity score">
            <svg viewBox="0 0 60 60" aria-hidden="true">
              <defs>
                <linearGradient id="scoreGradient" x1="0" y1="0" x2="1" y2="1">
                  <stop offset="0%" stop-color="#0aa6c2"/>
                  <stop offset="100%" stop-color="#58dcc8"/>
                </linearGradient>
              </defs>
              <circle class="score-bg" cx="30" cy="30" r="25"></circle>
              <circle class="score-progress" id="scoreProgress" cx="30" cy="30" r="25"></circle>
            </svg>
            <div class="score-label">
              <span id="scoreText">0</span>
              <small>score</small>
            </div>
          </div>
        </div>

        <form class="quick-add" id="quickAddForm" autocomplete="off">
          <input id="taskInput" type="text" inputmode="text" placeholder="Add a premium move…" maxlength="120" aria-label="Task title" />
          <button class="primary-btn" type="submit" aria-label="Add task">＋</button>
        </form>
      </div>
    </section>

    <!-- Animated stats -->
    <section class="stats-grid" aria-label="Productivity stats">
      <article class="stat-card glass">
        <div class="stat-title">Active</div>
        <div class="stat-value" id="activeCount">0</div>
        <div class="stat-caption">open tasks</div>
      </article>
      <article class="stat-card glass">
        <div class="stat-title">Done</div>
        <div class="stat-value" id="doneCount">0</div>
        <div class="stat-caption">completed</div>
      </article>
      <article class="stat-card glass">
        <div class="stat-title">Streak</div>
        <div class="stat-value"><span id="streakCount">0</span>🔥</div>
        <div class="stat-caption">daily wins</div>
      </article>
    </section>

    <!-- Task controls -->
    <section class="section-head">
      <div>
        <h3>Your tide list</h3>
        <p id="taskSubline">Everything important, beautifully organized.</p>
      </div>

      <div class="filters" role="tablist" aria-label="Task filters">
        <button class="filter-btn active" type="button" data-filter="all">All</button>
        <button class="filter-btn" type="button" data-filter="active">Active</button>
        <button class="filter-btn" type="button" data-filter="done">Done</button>
      </div>
    </section>

    <!-- Rendered task list -->
    <section class="task-list" id="taskList" aria-live="polite"></section>
  </main>

  <!-- iOS-style floating bottom nav -->
  <nav class="bottom-nav-wrap" aria-label="Floating app navigation">
    <div class="bottom-nav glass">
      <button class="nav-item active" type="button" data-filter-jump="all" aria-label="Show all tasks">
        <svg class="icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <path d="M5 7h14M5 12h14M5 17h9" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
        All
      </button>
      <button class="nav-add" id="openCreateModal" type="button" aria-label="Open task creator">
        <span>＋</span> Add
      </button>
      <button class="nav-item" type="button" data-filter-jump="done" aria-label="Show done tasks">
        <svg class="icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <path d="M20 6 9 17l-5-5" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        Done
      </button>
    </div>
  </nav>

  <!-- Modal editor -->
  <div class="modal-backdrop" id="modalBackdrop" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
    <section class="modal-card glass">
      <div class="modal-handle" aria-hidden="true"></div>
      <div class="modal-header">
        <h3 id="modalTitle">New task</h3>
        <button class="icon-btn" id="closeModal" type="button" aria-label="Close editor">✕</button>
      </div>

      <form id="modalForm">
        <div class="field-group">
          <label class="field-label" for="modalTaskText">Task</label>
          <textarea class="task-textarea" id="modalTaskText" maxlength="160" placeholder="Write the exact move you need to execute…"></textarea>
        </div>

        <div class="field-group" style="margin-top:12px;">
          <label class="field-label" for="modalPriority">Priority</label>
          <select class="priority-select" id="modalPriority">
            <option value="Calm">Calm priority</option>
            <option value="Focus">Focus priority</option>
            <option value="High">High priority</option>
            <option value="Elite">Elite priority</option>
          </select>
        </div>

        <div class="modal-actions">
          <button class="secondary-btn" id="cancelModal" type="button">Cancel</button>
          <button class="primary-btn" type="submit" style="height:52px;border-radius:20px;">Save task</button>
        </div>
      </form>
    </section>
  </div>

  <!-- Toast notification -->
  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <script>
    /* =========================================================
       COASTFLOW APP LOGIC
       Clean state architecture, localStorage persistence,
       mobile gestures, drag reorder, Web Audio API polish.
       ========================================================= */

    /* -----------------------------
       1. DOM REFERENCES
    ----------------------------- */
    const $ = (selector, scope = document) => scope.querySelector(selector);
    const $$ = (selector, scope = document) => Array.from(scope.querySelectorAll(selector));

    const body = document.body;
    const loader = $('#loader');
    const quickAddForm = $('#quickAddForm');
    const taskInput = $('#taskInput');
    const taskList = $('#taskList');
    const filterButtons = $$('.filter-btn');
    const navItems = $$('.nav-item');
    const openCreateModalBtn = $('#openCreateModal');

    const modalBackdrop = $('#modalBackdrop');
    const modalTitle = $('#modalTitle');
    const modalForm = $('#modalForm');
    const modalTaskText = $('#modalTaskText');
    const modalPriority = $('#modalPriority');
    const closeModalBtn = $('#closeModal');
    const cancelModalBtn = $('#cancelModal');

    const themeToggle = $('#themeToggle');
    const themeIcon = $('#themeIcon');
    const soundToggle = $('#soundToggle');
    const soundWaveIcon = $('#soundWaveIcon');

    const greetingTitle = $('#greetingTitle');
    const focusLine = $('#focusLine');
    const todayLabel = $('#todayLabel');
    const activeCount = $('#activeCount');
    const doneCount = $('#doneCount');
    const streakCount = $('#streakCount');
    const scoreText = $('#scoreText');
    const scoreProgress = $('#scoreProgress');
    const taskSubline = $('#taskSubline');
    const toast = $('#toast');

    /* -----------------------------
       2. STORAGE KEYS + STATE
    ----------------------------- */
    const STORAGE_KEY = 'coastflow.tasks.v1';
    const SETTINGS_KEY = 'coastflow.settings.v1';
    const STREAK_KEY = 'coastflow.streak.v1';

    let state = {
      tasks: [],
      filter: 'all',
      editingId: null,
      settings: {
        theme: 'light',
        sound: true
      },
      streak: {
        count: 0,
        lastCompletionDate: null
      }
    };

    /* -----------------------------
       3. UTILITIES
    ----------------------------- */
    const uid = () => `${Date.now()}-${Math.random().toString(16).slice(2)}`;

    const todayKey = () => {
      const date = new Date();
      const year = date.getFullYear();
      const month = String(date.getMonth() + 1).padStart(2, '0');
      const day = String(date.getDate()).padStart(2, '0');
      return `${year}-${month}-${day}`;
    };

    const yesterdayKey = () => {
      const date = new Date();
      date.setDate(date.getDate() - 1);
      const year = date.getFullYear();
      const month = String(date.getMonth() + 1).padStart(2, '0');
      const day = String(date.getDate()).padStart(2, '0');
      return `${year}-${month}-${day}`;
    };

    const formatTime = (timestamp) => {
      return new Intl.DateTimeFormat(undefined, {
        hour: '2-digit',
        minute: '2-digit'
      }).format(new Date(timestamp));
    };

    const escapeHTML = (value) => {
      return String(value)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    };

    const save = () => {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state.tasks));
      localStorage.setItem(SETTINGS_KEY, JSON.stringify(state.settings));
      localStorage.setItem(STREAK_KEY, JSON.stringify(state.streak));
    };

    const load = () => {
      try {
        state.tasks = JSON.parse(localStorage.getItem(STORAGE_KEY)) || seedTasks();
        state.settings = {
          ...state.settings,
          ...(JSON.parse(localStorage.getItem(SETTINGS_KEY)) || {})
        };
        state.streak = {
          ...state.streak,
          ...(JSON.parse(localStorage.getItem(STREAK_KEY)) || {})
        };
      } catch (error) {
        console.warn('Storage reset because saved data was invalid.', error);
        state.tasks = seedTasks();
      }
    };

    const seedTasks = () => [
      {
        id: uid(),
        title: 'Plan the top 3 moves for today',
        done: false,
        priority: 'Elite',
        createdAt: Date.now() - 300000
      },
      {
        id: uid(),
        title: 'Clear one tiny task in under 5 minutes',
        done: false,
        priority: 'Focus',
        createdAt: Date.now() - 120000
      }
    ];

    /* -----------------------------
       4. WEB AUDIO API SOUND SYSTEM
       Tiny ocean-inspired interaction tones.
    ----------------------------- */
    let audioContext = null;
    let oceanNoiseNode = null;
    let oceanGain = null;

    const ensureAudio = () => {
      if (!audioContext) {
        audioContext = new (window.AudioContext || window.webkitAudioContext)();
      }
      if (audioContext.state === 'suspended') audioContext.resume();
    };

    const playTone = (type = 'tap') => {
      if (!state.settings.sound) return;
      ensureAudio();

      const now = audioContext.currentTime;
      const oscillator = audioContext.createOscillator();
      const gain = audioContext.createGain();

      const presets = {
        tap: { freq: 520, end: 680, duration: 0.055, gain: 0.035 },
        add: { freq: 420, end: 860, duration: 0.12, gain: 0.045 },
        done: { freq: 620, end: 980, duration: 0.16, gain: 0.055 },
        delete: { freq: 220, end: 120, duration: 0.13, gain: 0.045 },
        modal: { freq: 340, end: 540, duration: 0.10, gain: 0.035 }
      };

      const preset = presets[type] || presets.tap;
      oscillator.type = 'sine';
      oscillator.frequency.setValueAtTime(preset.freq, now);
      oscillator.frequency.exponentialRampToValueAtTime(Math.max(1, preset.end), now + preset.duration);

      gain.gain.setValueAtTime(0.0001, now);
      gain.gain.exponentialRampToValueAtTime(preset.gain, now + 0.015);
      gain.gain.exponentialRampToValueAtTime(0.0001, now + preset.duration);

      oscillator.connect(gain);
      gain.connect(audioContext.destination);
      oscillator.start(now);
      oscillator.stop(now + preset.duration + 0.02);
    };

    const setOceanAmbience = (enabled) => {
      if (!enabled) {
        if (oceanGain) {
          oceanGain.gain.setTargetAtTime(0, audioContext?.currentTime || 0, 0.05);
        }
        return;
      }

      ensureAudio();
      if (oceanNoiseNode) {
        oceanGain.gain.setTargetAtTime(0.018, audioContext.currentTime, 0.1);
        return;
      }

      // Lightweight filtered noise creates a very subtle ocean-air feel.
      const bufferSize = 2 * audioContext.sampleRate;
      const noiseBuffer = audioContext.createBuffer(1, bufferSize, audioContext.sampleRate);
      const output = noiseBuffer.getChannelData(0);

      for (let i = 0; i < bufferSize; i++) {
        output[i] = (Math.random() * 2 - 1) * 0.42;
      }

      oceanNoiseNode = audioContext.createBufferSource();
      oceanNoiseNode.buffer = noiseBuffer;
      oceanNoiseNode.loop = true;

      const filter = audioContext.createBiquadFilter();
      filter.type = 'lowpass';
      filter.frequency.value = 420;
      filter.Q.value = 0.8;

      oceanGain = audioContext.createGain();
      oceanGain.gain.value = 0.0001;

      oceanNoiseNode.connect(filter);
      filter.connect(oceanGain);
      oceanGain.connect(audioContext.destination);
      oceanNoiseNode.start();
      oceanGain.gain.setTargetAtTime(0.018, audioContext.currentTime, 0.2);
    };

    /* -----------------------------
       5. PWA MANIFEST BLOB
    ----------------------------- */
    const registerManifest = () => {
      const manifest = {
        name: 'CoastFlow Task Manager',
        short_name: 'CoastFlow',
        start_url: '.',
        display: 'standalone',
        background_color: '#dff8ff',
        theme_color: '#73cde7',
        orientation: 'portrait-primary',
        icons: [
          {
            src: 'data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 128 128%22%3E%3Crect width=%22128%22 height=%22128%22 rx=%2234%22 fill=%22%230aa6c2%22/%3E%3Cpath d=%22M25 70c16-18 32 18 48 0s32 18 48 0%22 stroke=%22white%22 stroke-width=%2210%22 fill=%22none%22 stroke-linecap=%22round%22/%3E%3C/svg%3E',
            sizes: '128x128',
            type: 'image/svg+xml'
          }
        ]
      };

      const blob = new Blob([JSON.stringify(manifest)], { type: 'application/manifest+json' });
      const manifestURL = URL.createObjectURL(blob);
      const link = document.createElement('link');
      link.rel = 'manifest';
      link.href = manifestURL;
      document.head.appendChild(link);
    };

    /* -----------------------------
       6. GREETING + THEME
    ----------------------------- */
    const updateGreeting = () => {
      const hour = new Date().getHours();
      const date = new Intl.DateTimeFormat(undefined, {
        weekday: 'long',
        month: 'short',
        day: 'numeric'
      }).format(new Date());

      todayLabel.textContent = date;

      if (hour < 12) {
        greetingTitle.textContent = 'Good morning.';
        focusLine.textContent = 'Start calm. Pick the move that makes the day profitable.';
      } else if (hour < 18) {
        greetingTitle.textContent = 'Good afternoon.';
        focusLine.textContent = 'Stay sharp. One clean task at a time, no chaos.';
      } else {
        greetingTitle.textContent = 'Good evening.';
        focusLine.textContent = 'Close the loop. Finish strong and protect tomorrow.';
      }
    };

    const applyTheme = () => {
      body.classList.toggle('dark', state.settings.theme === 'dark');
      themeIcon.innerHTML = state.settings.theme === 'dark'
        ? '<path d="M12 3v2.2M12 18.8V21M21 12h-2.2M5.2 12H3M18.4 5.6 16.9 7.1M7.1 16.9 5.6 18.4M18.4 18.4 16.9 16.9M7.1 7.1 5.6 5.6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><circle cx="12" cy="12" r="4" stroke="currentColor" stroke-width="2"/>'
        : '<path d="M21 12.7A8.5 8.5 0 1 1 11.3 3 6.7 6.7 0 0 0 21 12.7Z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>';
    };

    const applySoundIcon = () => {
      soundWaveIcon.style.opacity = state.settings.sound ? '1' : '0.18';
      soundToggle.style.filter = state.settings.sound ? 'none' : 'grayscale(.5)';
    };

    /* -----------------------------
       7. TASK CRUD
    ----------------------------- */
    const addTask = (title, priority = 'Focus') => {
      const cleanTitle = title.trim();
      if (!cleanTitle) {
        showToast('Write a task first 🌊');
        return;
      }

      state.tasks.unshift({
        id: uid(),
        title: cleanTitle,
        done: false,
        priority,
        createdAt: Date.now()
      });

      save();
      render();
      playTone('add');
      showToast('Task added. Execute cleanly ✨');
    };

    const updateTask = (id, updates) => {
      state.tasks = state.tasks.map(task => task.id === id ? { ...task, ...updates } : task);
      save();
      render();
    };

    const deleteTask = (id) => {
      state.tasks = state.tasks.filter(task => task.id !== id);
      save();
      render();
      playTone('delete');
      showToast('Task deleted');
    };

    const toggleTask = (id) => {
      const task = state.tasks.find(item => item.id === id);
      if (!task) return;

      const nextDone = !task.done;
      task.done = nextDone;

      if (nextDone) {
        updateStreakOnCompletion();
        playTone('done');
        showToast('Done. That is momentum 🔥');
      } else {
        playTone('tap');
      }

      save();
      render();
    };

    const updateStreakOnCompletion = () => {
      const today = todayKey();
      const yesterday = yesterdayKey();

      if (state.streak.lastCompletionDate === today) return;

      if (state.streak.lastCompletionDate === yesterday) {
        state.streak.count += 1;
      } else {
        state.streak.count = 1;
      }

      state.streak.lastCompletionDate = today;
    };

    const openModal = (mode = 'create', task = null) => {
      state.editingId = mode === 'edit' && task ? task.id : null;
      modalTitle.textContent = mode === 'edit' ? 'Edit task' : 'New task';
      modalTaskText.value = task ? task.title : '';
      modalPriority.value = task ? task.priority : 'Focus';
      modalBackdrop.classList.add('show');
      document.body.style.overflow = 'hidden';
      playTone('modal');
      setTimeout(() => modalTaskText.focus(), 120);
    };

    const closeModal = () => {
      modalBackdrop.classList.remove('show');
      document.body.style.overflow = '';
      state.editingId = null;
      modalForm.reset();
    };

    /* -----------------------------
       8. FILTERING + SCORING
    ----------------------------- */
    const getFilteredTasks = () => {
      if (state.filter === 'active') return state.tasks.filter(task => !task.done);
      if (state.filter === 'done') return state.tasks.filter(task => task.done);
      return state.tasks;
    };

    const getStats = () => {
      const total = state.tasks.length;
      const done = state.tasks.filter(task => task.done).length;
      const active = total - done;
      const score = total === 0 ? 0 : Math.round((done / total) * 100);
      return { total, done, active, score };
    };

    const updateStats = () => {
      const { total, done, active, score } = getStats();
      activeCount.textContent = active;
      doneCount.textContent = done;
      streakCount.textContent = state.streak.count;
      scoreText.textContent = score;

      const circumference = 157;
      scoreProgress.style.strokeDashoffset = String(circumference - (score / 100) * circumference);

      if (total === 0) {
        taskSubline.textContent = 'Your coast is clear. Add your next move.';
      } else if (score === 100) {
        taskSubline.textContent = 'Clean sweep. Elite execution today.';
      } else if (active > done) {
        taskSubline.textContent = `${active} active task${active === 1 ? '' : 's'} waiting for action.`;
      } else {
        taskSubline.textContent = 'Momentum is building. Keep the tide moving.';
      }
    };

    const setFilter = (filter) => {
      state.filter = filter;
      filterButtons.forEach(btn => btn.classList.toggle('active', btn.dataset.filter === filter));
      navItems.forEach(btn => btn.classList.toggle('active', btn.dataset.filterJump === filter));
      render();
      playTone('tap');
    };

    /* -----------------------------
       9. RENDERING
    ----------------------------- */
    const taskIcon = `
      <svg class="check-mark" viewBox="0 0 24 24" fill="none" aria-hidden="true">
        <path d="M20 6 9 17l-5-5" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    `;

    const render = () => {
      updateStats();
      const tasks = getFilteredTasks();

      if (tasks.length === 0) {
        const message = state.filter === 'done'
          ? 'No finished tasks yet. Complete one tiny move and start the streak.'
          : state.filter === 'active'
            ? 'No active tasks. You are either free or dangerously powerful.'
            : 'Add your first task and let the day become expensive in a good way.';

        taskList.innerHTML = `
          <div class="empty-state">
            <div>
              <div class="empty-icon" aria-hidden="true">🌊</div>
              <h4>Nothing here yet</h4>
              <p>${message}</p>
            </div>
          </div>
        `;
        return;
      }

      taskList.innerHTML = tasks.map(task => `
        <article class="task-shell ${task.done ? 'done' : ''}" data-id="${task.id}" draggable="true">
          <div class="delete-bg">Delete</div>
          <div class="task-card glass">
            <button class="check-btn" type="button" data-action="toggle" aria-label="Toggle task completion">
              ${taskIcon}
            </button>

            <div class="task-main">
              <div class="task-title">${escapeHTML(task.title)}</div>
              <div class="task-meta">
                <span class="priority-pill">${escapeHTML(task.priority)}</span>
                <span>${formatTime(task.createdAt)}</span>
              </div>
            </div>

            <div class="task-actions">
              <button class="mini-btn" type="button" data-action="edit" aria-label="Edit task">
                <svg class="icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                  <path d="M4 20h4l10.5-10.5a2.8 2.8 0 0 0-4-4L4 16v4Z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
                </svg>
              </button>
              <button class="mini-btn danger" type="button" data-action="delete" aria-label="Delete task">
                <svg class="icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                  <path d="M6 7h12M10 11v6M14 11v6M9 7l1-3h4l1 3M8 7l1 13h6l1-13" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
              </button>
            </div>
          </div>
        </article>
      `).join('');

      bindTaskGestures();
    };

    /* -----------------------------
       10. MOBILE SWIPE TO DELETE
    ----------------------------- */
    const bindTaskGestures = () => {
      $$('.task-shell').forEach(shell => {
        const card = $('.task-card', shell);
        let startX = 0;
        let startY = 0;
        let currentX = 0;
        let isSwiping = false;

        shell.addEventListener('pointerdown', (event) => {
          startX = event.clientX;
          startY = event.clientY;
          currentX = 0;
          isSwiping = false;
          card.style.transition = 'none';
        });

        shell.addEventListener('pointermove', (event) => {
          const dx = event.clientX - startX;
          const dy = event.clientY - startY;

          if (Math.abs(dy) > Math.abs(dx)) return;
          if (dx < -8) {
            isSwiping = true;
            shell.classList.add('swiping');
            currentX = Math.max(dx, -112);
            card.style.transform = `translateX(${currentX}px)`;
          }
        });

        shell.addEventListener('pointerup', () => {
          card.style.transition = '';
          if (isSwiping && currentX < -86) {
            const id = shell.dataset.id;
            card.style.transform = 'translateX(-120%)';
            card.style.opacity = '0';
            setTimeout(() => deleteTask(id), 180);
          } else {
            card.style.transform = '';
            shell.classList.remove('swiping');
          }
        });

        shell.addEventListener('pointercancel', () => {
          card.style.transition = '';
          card.style.transform = '';
          shell.classList.remove('swiping');
        });
      });
    };

    /* -----------------------------
       11. DRAG / REORDER SYSTEM
       HTML5 drag works on desktop and many mobile browsers.
       Swipe is preserved separately through pointer gestures.
    ----------------------------- */
    let draggedId = null;

    taskList.addEventListener('dragstart', (event) => {
      const shell = event.target.closest('.task-shell');
      if (!shell) return;
      draggedId = shell.dataset.id;
      shell.classList.add('dragging');
      event.dataTransfer.effectAllowed = 'move';
      event.dataTransfer.setData('text/plain', draggedId);
      playTone('tap');
    });

    taskList.addEventListener('dragover', (event) => {
      event.preventDefault();
      const shell = event.target.closest('.task-shell');
      if (!shell || shell.dataset.id === draggedId) return;
      $$('.task-shell').forEach(item => item.classList.remove('drop-target'));
      shell.classList.add('drop-target');
    });

    taskList.addEventListener('drop', (event) => {
      event.preventDefault();
      const targetShell = event.target.closest('.task-shell');
      if (!targetShell || !draggedId) return;

      const targetId = targetShell.dataset.id;
      reorderTasks(draggedId, targetId);
      playTone('add');
    });

    taskList.addEventListener('dragend', () => {
      draggedId = null;
      $$('.task-shell').forEach(item => item.classList.remove('dragging', 'drop-target'));
    });

    const reorderTasks = (sourceId, targetId) => {
      if (sourceId === targetId) return;

      const sourceIndex = state.tasks.findIndex(task => task.id === sourceId);
      const targetIndex = state.tasks.findIndex(task => task.id === targetId);
      if (sourceIndex < 0 || targetIndex < 0) return;

      const [moved] = state.tasks.splice(sourceIndex, 1);
      state.tasks.splice(targetIndex, 0, moved);
      save();
      render();
      showToast('Reordered like a pro');
    };

    /* -----------------------------
       12. EVENT HANDLERS
    ----------------------------- */
    quickAddForm.addEventListener('submit', (event) => {
      event.preventDefault();
      addTask(taskInput.value, 'Focus');
      taskInput.value = '';
    });

    taskList.addEventListener('click', (event) => {
      const button = event.target.closest('button');
      const shell = event.target.closest('.task-shell');
      if (!button || !shell) return;

      const id = shell.dataset.id;
      const action = button.dataset.action;
      const task = state.tasks.find(item => item.id === id);

      if (action === 'toggle') toggleTask(id);
      if (action === 'delete') deleteTask(id);
      if (action === 'edit' && task) openModal('edit', task);
    });

    filterButtons.forEach(button => {
      button.addEventListener('click', () => setFilter(button.dataset.filter));
    });

    navItems.forEach(button => {
      button.addEventListener('click', () => setFilter(button.dataset.filterJump));
    });

    openCreateModalBtn.addEventListener('click', () => openModal('create'));
    closeModalBtn.addEventListener('click', closeModal);
    cancelModalBtn.addEventListener('click', closeModal);

    modalBackdrop.addEventListener('click', (event) => {
      if (event.target === modalBackdrop) closeModal();
    });

    modalForm.addEventListener('submit', (event) => {
      event.preventDefault();
      const title = modalTaskText.value.trim();
      const priority = modalPriority.value;

      if (!title) {
        showToast('Give the task a name first');
        return;
      }

      if (state.editingId) {
        updateTask(state.editingId, { title, priority });
        playTone('add');
        showToast('Task updated');
      } else {
        addTask(title, priority);
      }

      closeModal();
    });

    themeToggle.addEventListener('click', () => {
      state.settings.theme = state.settings.theme === 'dark' ? 'light' : 'dark';
      applyTheme();
      save();
      playTone('tap');
    });

    soundToggle.addEventListener('click', () => {
      state.settings.sound = !state.settings.sound;
      applySoundIcon();
      save();
      if (state.settings.sound) {
        playTone('add');
        setOceanAmbience(true);
        showToast('Ocean sound enabled 🌊');
      } else {
        setOceanAmbience(false);
        showToast('Sound muted');
      }
    });

    document.addEventListener('keydown', (event) => {
      if (event.key === 'Escape' && modalBackdrop.classList.contains('show')) closeModal();
    });

    /* -----------------------------
       13. TOAST SYSTEM
    ----------------------------- */
    let toastTimer = null;
    const showToast = (message) => {
      toast.textContent = message;
      toast.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => {
        toast.classList.remove('show');
      }, 1850);
    };

    /* -----------------------------
       14. INITIALIZATION
    ----------------------------- */
    const init = () => {
      registerManifest();
      load();
      updateGreeting();
      applyTheme();
      applySoundIcon();
      render();
      save();

      // Hide loader after first paint for a polished app-like entry.
      requestAnimationFrame(() => {
        setTimeout(() => loader.classList.add('hide'), 520);
      });
    };

    init();
  </script>
</body>
</html>
