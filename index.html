<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Coastal Flow Tasks</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      -webkit-tap-highlight-color: transparent;
    }

    :root {
      --bg-1: #dff8ff;
      --bg-2: #b7e8f7;
      --bg-3: #f7fcff;
      --glass: rgba(255, 255, 255, 0.34);
      --glass-strong: rgba(255, 255, 255, 0.58);
      --border: rgba(255, 255, 255, 0.62);
      --text: #0f2d3a;
      --muted: rgba(15, 45, 58, 0.58);
      --accent: #22a9c9;
      --accent-dark: #087d9d;
      --danger: #ff5f70;
      --shadow: 0 24px 80px rgba(14, 75, 102, 0.18);
      --radius-xl: 32px;
      --radius-lg: 24px;
      --radius-md: 18px;
    }

    body.dark {
      --bg-1: #061a22;
      --bg-2: #092b37;
      --bg-3: #123f4f;
      --glass: rgba(255, 255, 255, 0.08);
      --glass-strong: rgba(255, 255, 255, 0.13);
      --border: rgba(255, 255, 255, 0.16);
      --text: #effcff;
      --muted: rgba(239, 252, 255, 0.62);
      --accent: #65d9f5;
      --accent-dark: #3abbd9;
      --shadow: 0 24px 80px rgba(0, 0, 0, 0.38);
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      min-height: 100vh;
      color: var(--text);
      background:
        radial-gradient(circle at 20% 10%, rgba(255, 255, 255, 0.9), transparent 28%),
        radial-gradient(circle at 80% 20%, rgba(103, 218, 245, 0.45), transparent 32%),
        linear-gradient(135deg, var(--bg-1), var(--bg-2), var(--bg-3));
      overflow-x: hidden;
      padding: 22px;
      transition: background 0.4s ease, color 0.4s ease;
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      width: 360px;
      height: 360px;
      border-radius: 999px;
      filter: blur(10px);
      pointer-events: none;
      z-index: -1;
      opacity: 0.55;
      animation: drift 12s ease-in-out infinite alternate;
    }

    body::before {
      top: -120px;
      left: -120px;
      background: rgba(255, 255, 255, 0.65);
    }

    body::after {
      right: -130px;
      bottom: -130px;
      background: rgba(63, 203, 231, 0.42);
      animation-delay: -4s;
    }

    @keyframes drift {
      from { transform: translate3d(0, 0, 0) scale(1); }
      to { transform: translate3d(32px, -22px, 0) scale(1.08); }
    }

    .app {
      width: min(100%, 520px);
      margin: 0 auto;
      padding-bottom: 96px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 22px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo {
      width: 48px;
      height: 48px;
      border-radius: 18px;
      display: grid;
      place-items: center;
      background: var(--glass-strong);
      border: 1px solid var(--border);
      box-shadow: 0 14px 36px rgba(10, 113, 143, 0.16);
      backdrop-filter: blur(22px);
      font-size: 22px;
    }

    .brand h1 {
      font-size: 1.15rem;
      letter-spacing: -0.04em;
      line-height: 1.1;
    }

    .brand p {
      font-size: 0.78rem;
      color: var(--muted);
      margin-top: 3px;
      font-weight: 600;
    }

    .icon-btn {
      width: 46px;
      height: 46px;
      border: 1px solid var(--border);
      border-radius: 18px;
      background: var(--glass);
      backdrop-filter: blur(22px);
      color: var(--text);
      font-size: 1.05rem;
      cursor: pointer;
      box-shadow: 0 12px 34px rgba(10, 113, 143, 0.12);
      transition: transform 0.2s ease, background 0.2s ease;
    }

    .icon-btn:active {
      transform: scale(0.93);
    }

    .hero-card {
      position: relative;
      overflow: hidden;
      border-radius: var(--radius-xl);
      padding: 28px;
      min-height: 190px;
      background: linear-gradient(145deg, var(--glass-strong), var(--glass));
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      backdrop-filter: blur(28px);
      margin-bottom: 18px;
    }

    .hero-card::after {
      content: "";
      position: absolute;
      inset: auto -20% -55% -20%;
      height: 160px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.32);
      filter: blur(2px);
    }

    .hero-card .tag {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 9px 12px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.28);
      border: 1px solid var(--border);
      color: var(--muted);
      font-size: 0.78rem;
      font-weight: 800;
      margin-bottom: 18px;
    }

    .hero-card h2 {
      position: relative;
      z-index: 1;
      font-size: clamp(2rem, 10vw, 3.2rem);
      line-height: 0.92;
      letter-spacing: -0.085em;
      max-width: 340px;
    }

    .hero-card p {
      position: relative;
      z-index: 1;
      color: var(--muted);
      margin-top: 14px;
      max-width: 300px;
      font-size: 0.95rem;
      font-weight: 600;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 18px;
    }

    .stat-card {
      padding: 16px 12px;
      border-radius: var(--radius-lg);
      background: var(--glass);
      border: 1px solid var(--border);
      backdrop-filter: blur(22px);
      box-shadow: 0 14px 38px rgba(9, 95, 122, 0.1);
      text-align: center;
    }

    .stat-card strong {
      display: block;
      font-size: 1.45rem;
      letter-spacing: -0.05em;
    }

    .stat-card span {
      display: block;
      margin-top: 3px;
      color: var(--muted);
      font-size: 0.72rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .composer {
      display: flex;
      gap: 10px;
      padding: 10px;
      border-radius: 24px;
      background: var(--glass);
      border: 1px solid var(--border);
      backdrop-filter: blur(24px);
      box-shadow: 0 18px 50px rgba(9, 95, 122, 0.12);
      margin-bottom: 14px;
    }

    .composer input {
      flex: 1;
      border: 0;
      outline: 0;
      background: transparent;
      color: var(--text);
      padding: 0 8px;
      font-size: 1rem;
      min-width: 0;
    }

    .composer input::placeholder {
      color: var(--muted);
    }

    .add-btn {
      width: 50px;
      height: 50px;
      border: 0;
      border-radius: 18px;
      background: linear-gradient(135deg, var(--accent), var(--accent-dark));
      color: white;
      display: grid;
      place-items: center;
      cursor: pointer;
      box-shadow: 0 14px 30px rgba(8, 125, 157, 0.28);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .send-arrow {
      width: 24px;
      height: 24px;
      fill: none;
      stroke: currentColor;
      stroke-width: 2.4;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .add-btn:active {
      transform: scale(0.92);
      box-shadow: 0 8px 18px rgba(8, 125, 157, 0.2);
    }

    .filters {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 18px;
    }

    .filter-btn {
      border: 1px solid var(--border);
      border-radius: 18px;
      background: var(--glass);
      color: var(--muted);
      padding: 12px;
      font-size: 0.82rem;
      font-weight: 900;
      cursor: pointer;
      backdrop-filter: blur(18px);
      transition: 0.2s ease;
    }

    .filter-btn.active {
      background: var(--glass-strong);
      color: var(--text);
      box-shadow: 0 12px 30px rgba(9, 95, 122, 0.12);
    }

    .tasks {
      display: grid;
      gap: 12px;
    }

    .task {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px;
      border-radius: 22px;
      background: var(--glass-strong);
      border: 1px solid var(--border);
      backdrop-filter: blur(24px);
      box-shadow: 0 14px 36px rgba(9, 95, 122, 0.11);
      animation: pop 0.28s ease both;
    }

    @keyframes pop {
      from { transform: translateY(10px) scale(0.98); opacity: 0; }
      to { transform: translateY(0) scale(1); opacity: 1; }
    }

    .check {
      flex: 0 0 auto;
      width: 26px;
      height: 26px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.2);
      display: grid;
      place-items: center;
      cursor: pointer;
      color: transparent;
      font-weight: 1000;
      transition: 0.2s ease;
    }

    .task.done .check {
      background: linear-gradient(135deg, var(--accent), var(--accent-dark));
      color: white;
    }

    .task-text {
      flex: 1;
      min-width: 0;
      font-weight: 800;
      line-height: 1.25;
      word-break: break-word;
    }

    .task.done .task-text {
      color: var(--muted);
      text-decoration: line-through;
    }

    .task-actions {
      display: flex;
      gap: 6px;
    }

    .mini-btn {
      width: 34px;
      height: 34px;
      border-radius: 13px;
      border: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.18);
      color: var(--text);
      cursor: pointer;
      transition: 0.2s ease;
    }

    .mini-btn:active {
      transform: scale(0.9);
    }

    .mini-btn.delete {
      color: var(--danger);
    }

    .empty {
      display: none;
      text-align: center;
      padding: 34px 22px;
      border-radius: var(--radius-xl);
      background: var(--glass);
      border: 1px solid var(--border);
      backdrop-filter: blur(22px);
      color: var(--muted);
      font-weight: 700;
    }

    .empty.show {
      display: block;
    }

    .empty .emoji {
      display: block;
      font-size: 2.6rem;
      margin-bottom: 10px;
    }

    .bottom-bar {
      position: fixed;
      left: 50%;
      bottom: 20px;
      transform: translateX(-50%);
      width: min(calc(100% - 32px), 500px);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 10px;
      border-radius: 28px;
      background: rgba(255, 255, 255, 0.34);
      border: 1px solid var(--border);
      backdrop-filter: blur(28px);
      box-shadow: var(--shadow);
      z-index: 10;
    }

    body.dark .bottom-bar {
      background: rgba(9, 43, 55, 0.62);
    }

    .bottom-bar button {
      flex: 1;
      border: 0;
      border-radius: 20px;
      background: transparent;
      color: var(--muted);
      padding: 12px 10px;
      font-weight: 900;
      cursor: pointer;
      transition: 0.2s ease;
    }

    .bottom-bar button.active {
      background: var(--glass-strong);
      color: var(--text);
      box-shadow: 0 12px 28px rgba(9, 95, 122, 0.12);
    }

    .modal-overlay {
      position: fixed;
      inset: 0;
      display: none;
      align-items: end;
      justify-content: center;
      padding: 18px;
      background: rgba(0, 0, 0, 0.28);
      backdrop-filter: blur(10px);
      z-index: 50;
    }

    .modal-overlay.show {
      display: flex;
    }

    .modal {
      width: min(100%, 500px);
      padding: 20px;
      border-radius: 30px;
      background: var(--glass-strong);
      border: 1px solid var(--border);
      backdrop-filter: blur(30px);
      box-shadow: var(--shadow);
      animation: slideUp 0.28s ease both;
    }

    @keyframes slideUp {
      from { transform: translateY(26px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    .modal h3 {
      font-size: 1.2rem;
      letter-spacing: -0.04em;
      margin-bottom: 12px;
    }

    .modal input {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.18);
      color: var(--text);
      outline: 0;
      padding: 15px;
      font-size: 1rem;
      margin-bottom: 12px;
    }

    .modal-actions {
      display: flex;
      gap: 10px;
    }

    .modal-actions button {
      flex: 1;
      border: 0;
      border-radius: 18px;
      padding: 14px;
      font-weight: 900;
      cursor: pointer;
    }

    .save-edit {
      background: linear-gradient(135deg, var(--accent), var(--accent-dark));
      color: #fff;
    }

    .cancel-edit {
      background: rgba(255, 255, 255, 0.18);
      color: var(--text);
      border: 1px solid var(--border) !important;
    }

    @media (max-width: 390px) {
      body {
        padding: 16px;
      }

      .hero-card {
        padding: 24px;
      }

      .stats {
        gap: 8px;
      }

      .stat-card {
        padding: 14px 8px;
      }
    }
  </style>
</head>

<body>
  <main class="app">
    <header class="topbar">
      <div class="brand">
        <div class="logo">🌊</div>
        <div>
          <h1>Coastal Flow</h1>
          <p id="dateText">Today</p>
        </div>
      </div>

      <button class="icon-btn" id="themeBtn" aria-label="Toggle dark mode">☾</button>
    </header>

    <section class="hero-card">
      <div class="tag">✨ Minimal task manager</div>
      <h2 id="greeting">Build your calm empire.</h2>
      <p>Plan the day, clear the noise, and move like a focused operator.</p>
    </section>

    <section class="stats">
      <div class="stat-card">
        <strong id="totalCount">0</strong>
        <span>Total</span>
      </div>
      <div class="stat-card">
        <strong id="activeCount">0</strong>
        <span>Active</span>
      </div>
      <div class="stat-card">
        <strong id="doneCount">0</strong>
        <span>Done</span>
      </div>
    </section>

    <form class="composer" id="taskForm">
      <input id="taskInput" type="text" placeholder="Add a high-value task..." autocomplete="off" />
      <button class="add-btn" type="submit" aria-label="Add task">
        <svg class="send-arrow" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M12 19V5M12 5L6 11M12 5L18 11" />
        </svg>
      </button>
    </form>

    <section class="filters">
      <button class="filter-btn active" data-filter="all">All</button>
      <button class="filter-btn" data-filter="active">Active</button>
      <button class="filter-btn" data-filter="done">Done</button>
    </section>

    <section class="tasks" id="tasks"></section>

    <section class="empty" id="emptyState">
      <span class="emoji">🐚</span>
      No tasks here. Add one and start stacking wins.
    </section>
  </main>

  <nav class="bottom-bar">
    <button class="active" data-filter="all">All</button>
    <button data-filter="active">Focus</button>
    <button data-filter="done">Wins</button>
  </nav>

  <div class="modal-overlay" id="editModal">
    <div class="modal">
      <h3>Edit task</h3>
      <input id="editInput" type="text" />
      <div class="modal-actions">
        <button class="cancel-edit" id="cancelEdit" type="button">Cancel</button>
        <button class="save-edit" id="saveEdit" type="button">Save</button>
      </div>
    </div>
  </div>

  <script>
    const body = document.body;
    const themeBtn = document.getElementById("themeBtn");
    const dateText = document.getElementById("dateText");
    const greeting = document.getElementById("greeting");
    const taskForm = document.getElementById("taskForm");
    const taskInput = document.getElementById("taskInput");
    const tasksContainer = document.getElementById("tasks");
    const emptyState = document.getElementById("emptyState");
    const totalCount = document.getElementById("totalCount");
    const activeCount = document.getElementById("activeCount");
    const doneCount = document.getElementById("doneCount");
    const filterButtons = document.querySelectorAll("[data-filter]");
    const editModal = document.getElementById("editModal");
    const editInput = document.getElementById("editInput");
    const saveEdit = document.getElementById("saveEdit");
    const cancelEdit = document.getElementById("cancelEdit");

    let tasks = JSON.parse(localStorage.getItem("coastalTasks")) || [];
    let currentFilter = "all";
    let editingTaskId = null;

    const today = new Date();
    dateText.textContent = today.toLocaleDateString("en-US", {
      weekday: "long",
      month: "short",
      day: "numeric"
    });

    function setGreeting() {
      const hour = new Date().getHours();

      if (hour < 12) {
        greeting.textContent = "Morning flow. Big wins only.";
      } else if (hour < 18) {
        greeting.textContent = "Afternoon focus. Execute clean.";
      } else {
        greeting.textContent = "Evening reset. Finish strong.";
      }
    }

    setGreeting();

    function saveTasks() {
      localStorage.setItem("coastalTasks", JSON.stringify(tasks));
    }

    function saveTheme(isDark) {
      localStorage.setItem("coastalTheme", isDark ? "dark" : "light");
    }

    function loadTheme() {
      const theme = localStorage.getItem("coastalTheme");
      if (theme === "dark") {
        body.classList.add("dark");
        themeBtn.textContent = "☀";
      }
    }

    loadTheme();

    themeBtn.addEventListener("click", () => {
      body.classList.toggle("dark");
      const isDark = body.classList.contains("dark");
      themeBtn.textContent = isDark ? "☀" : "☾";
      saveTheme(isDark);
    });

    function getFilteredTasks() {
      if (currentFilter === "active") {
        return tasks.filter(task => !task.done);
      }

      if (currentFilter === "done") {
        return tasks.filter(task => task.done);
      }

      return tasks;
    }

    function updateStats() {
      const done = tasks.filter(task => task.done).length;
      const active = tasks.length - done;

      totalCount.textContent = tasks.length;
      activeCount.textContent = active;
      doneCount.textContent = done;
    }

    function renderTasks() {
      tasksContainer.innerHTML = "";
      const filteredTasks = getFilteredTasks();

      emptyState.classList.toggle("show", filteredTasks.length === 0);

      filteredTasks.forEach(task => {
        const taskElement = document.createElement("article");
        taskElement.className = `task ${task.done ? "done" : ""}`;
        taskElement.dataset.id = task.id;

        taskElement.innerHTML = `
          <button class="check" aria-label="Complete task">✓</button>
          <div class="task-text"></div>
          <div class="task-actions">
            <button class="mini-btn edit" aria-label="Edit task">✎</button>
            <button class="mini-btn delete" aria-label="Delete task">×</button>
          </div>
        `;

        taskElement.querySelector(".task-text").textContent = task.text;

        taskElement.querySelector(".check").addEventListener("click", () => {
          toggleTask(task.id);
        });

        taskElement.querySelector(".edit").addEventListener("click", () => {
          openEditModal(task.id);
        });

        taskElement.querySelector(".delete").addEventListener("click", () => {
          deleteTask(task.id);
        });

        tasksContainer.appendChild(taskElement);
      });

      updateStats();
    }

    function addTask(text) {
      const cleanText = text.trim();
      if (!cleanText) return;

      tasks.unshift({
        id: Date.now(),
        text: cleanText,
        done: false
      });

      saveTasks();
      renderTasks();
    }

    function toggleTask(id) {
      tasks = tasks.map(task => {
        if (task.id === id) {
          return { ...task, done: !task.done };
        }
        return task;
      });

      saveTasks();
      renderTasks();
    }

    function deleteTask(id) {
      tasks = tasks.filter(task => task.id !== id);
      saveTasks();
      renderTasks();
    }

    function openEditModal(id) {
      const task = tasks.find(item => item.id === id);
      if (!task) return;

      editingTaskId = id;
      editInput.value = task.text;
      editModal.classList.add("show");
      setTimeout(() => editInput.focus(), 80);
    }

    function closeEditModal() {
      editingTaskId = null;
      editInput.value = "";
      editModal.classList.remove("show");
    }

    function updateTask() {
      const cleanText = editInput.value.trim();
      if (!cleanText || editingTaskId === null) return;

      tasks = tasks.map(task => {
        if (task.id === editingTaskId) {
          return { ...task, text: cleanText };
        }
        return task;
      });

      saveTasks();
      renderTasks();
      closeEditModal();
    }

    taskForm.addEventListener("submit", event => {
      event.preventDefault();
      addTask(taskInput.value);
      taskInput.value = "";
      taskInput.focus();
    });

    filterButtons.forEach(button => {
      button.addEventListener("click", () => {
        currentFilter = button.dataset.filter;

        filterButtons.forEach(btn => {
          btn.classList.toggle("active", btn.dataset.filter === currentFilter);
        });

        renderTasks();
      });
    });

    saveEdit.addEventListener("click", updateTask);
    cancelEdit.addEventListener("click", closeEditModal);

    editInput.addEventListener("keydown", event => {
      if (event.key === "Enter") updateTask();
      if (event.key === "Escape") closeEditModal();
    });

    editModal.addEventListener("click", event => {
      if (event.target === editModal) closeEditModal();
    });

    renderTasks();
  </script>
</body>
</html>
